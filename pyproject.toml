[project]
name = "tablescanner"
version = "1.0.0"
description = "TableScanner FastAPI Application"
requires-python = ">=3.9"
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "KBUtilLib",
    "minio>=7.2.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
