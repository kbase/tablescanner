[project]
name = "tablescanner"
version = "1.0.0"
description = "TableScanner FastAPI Application"
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]>=0.124.4",
    "uvicorn>=0.38.0",
    #"KBUtilLib",  # KBase internal library - version managed by KBase infrastructure
    "minio>=7.2.20",
    "pydantic-settings>=2.0.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
