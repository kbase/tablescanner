<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TableScanner - Research Data Explorer</title>
    <meta name="description" content="Research-grade viewer for KBase BERDL Table data">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        /* =============================================================================
   CSS VARIABLES - Scientific Light Theme
============================================================================= */
        :root {
            --sidebar-width: 280px;
            --header-height: 48px;
            --footer-height: 40px;
            --toolbar-height: 48px;

            /* Colors - Scientific Modern */
            --bg-sidebar: #f8fafc;
            --bg-main: #ffffff;
            --bg-input: #f1f5f9;
            --bg-hover: #e2e8f0;

            --border-color: #e2e8f0;
            --border-strong: #cbd5e1;

            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --text-placeholder: #94a3b8;

            --accent-primary: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #dbeafe;

            --success: #059669;
            --success-light: #d1fae5;
            --warning: #d97706;
            --warning-light: #fef3c7;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            --info: #0891b2;
            --info-light: #cffafe;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-sticky: 2px 0 8px rgba(0, 0, 0, 0.08);

            /* Typography */
            --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --space-xl: 24px;
        }

        [data-theme="dark"] {
            --bg-sidebar: #1e293b;
            --bg-main: #0f172a;
            --bg-input: #334155;
            --bg-hover: #475569;
            --border-color: #334155;
            --border-strong: #475569;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --text-placeholder: #64748b;
            --accent-light: #1e3a5f;
            --success-light: #064e3b;
            --warning-light: #78350f;
            --danger-light: #7f1d1d;
            --info-light: #164e63;
        }

        /* =============================================================================
   RESET & BASE
============================================================================= */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font-ui);
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--bg-main);
            overflow: hidden;
        }

        /* =============================================================================
   LAYOUT - Sidebar-First Model
============================================================================= */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: var(--space-lg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-weight: 700;
            font-size: 16px;
            color: var(--text-primary);
        }

        .sidebar-logo i {
            color: var(--accent-primary);
            font-size: 20px;
        }

        .sidebar-version {
            font-size: 10px;
            padding: 2px 6px;
            background: var(--accent-light);
            color: var(--accent-primary);
            border-radius: 10px;
            font-weight: 600;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-md);
        }

        .sidebar-section {
            margin-bottom: var(--space-lg);
        }

        .sidebar-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .sidebar-section-title i {
            font-size: 12px;
        }

        .sidebar-footer {
            padding: var(--space-md);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        /* MAIN STAGE */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-main);
        }

        /* TOOLBAR */
        .toolbar {
            height: var(--toolbar-height);
            min-height: var(--toolbar-height);
            padding: 0 var(--space-lg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            background: var(--bg-main);
        }

        .toolbar-search {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .toolbar-search i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .toolbar-search input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all 0.15s;
        }

        .toolbar-search input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .toolbar-search input::placeholder {
            color: var(--text-placeholder);
        }

        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-left: auto;
        }

        /* DATA GRID WRAPPER */
        .data-grid-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .data-grid-container {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        /* FOOTER / STATUS BAR */
        .status-bar {
            height: var(--footer-height);
            min-height: var(--footer-height);
            padding: 0 var(--space-lg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-sidebar);
        }

        .status-left,
        .status-right {
            display: flex;
            align-items: center;
            gap: var(--space-lg);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .status-item i {
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-value {
            font-weight: 600;
            color: var(--accent-primary);
        }

        /* =============================================================================
   FORM CONTROLS
============================================================================= */
        .form-group {
            margin-bottom: var(--space-md);
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: var(--space-xs);
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            background: var(--bg-main);
            color: var(--text-primary);
            transition: all 0.15s;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .form-input::placeholder {
            color: var(--text-placeholder);
        }

        .form-input-sm {
            padding: 6px 8px;
            font-size: 12px;
        }

        .input-group {
            display: flex;
            gap: var(--space-xs);
        }

        .input-group .form-input {
            flex: 1;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-xs);
            padding: 8px 14px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--bg-hover);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 6px 10px;
            font-size: 12px;
        }

        .btn-icon {
            padding: 6px 8px;
        }

        .btn-icon i {
            font-size: 14px;
        }

        .btn-block {
            width: 100%;
        }

        /* iOS-style Toggle Switch */
        .toggle-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-sm) 0;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch-label {
            font-size: 13px;
            color: var(--text-primary);
        }

        .toggle-switch-track {
            width: 40px;
            height: 22px;
            background: var(--border-strong);
            border-radius: 11px;
            position: relative;
            transition: background 0.2s;
        }

        .toggle-switch-track::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-switch input:checked+.toggle-switch-track {
            background: var(--accent-primary);
        }

        .toggle-switch input:checked+.toggle-switch-track::after {
            transform: translateX(18px);
        }

        /* =============================================================================
   DATA TABLE - High Density
============================================================================= */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-family: var(--font-mono);
            font-size: 12px;
        }

        .data-table thead {
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .data-table th {
            background: var(--bg-sidebar);
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            text-align: left;
            padding: 10px 12px;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .data-table th:hover {
            background: var(--bg-hover);
        }

        .data-table th.sortable::after {
            content: '';
            display: inline-block;
            width: 0;
            height: 0;
            margin-left: 6px;
            vertical-align: middle;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 4px solid var(--text-muted);
            opacity: 0.3;
        }

        .data-table th.sort-asc::after {
            border-bottom: 4px solid var(--success);
            opacity: 1;
        }

        .data-table th.sort-desc::after {
            border-bottom: none;
            border-top: 4px solid var(--warning);
            opacity: 1;
        }

        /* Sticky First Column */
        .data-table th:first-child,
        .data-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 10;
            background: inherit;
        }

        .data-table th:first-child {
            z-index: 25;
            background: var(--bg-sidebar);
        }

        .data-table td:first-child {
            background: var(--bg-main);
            box-shadow: var(--shadow-sticky);
        }

        .data-table td {
            padding: 6px 12px;
            border-bottom: 1px solid var(--border-color);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-primary);
        }

        .data-table tbody tr:hover td {
            background: var(--accent-light);
        }

        .data-table tbody tr:nth-child(even) td {
            background: var(--bg-input);
        }

        .data-table tbody tr:nth-child(even):hover td {
            background: var(--accent-light);
        }

        /* Cell Transformers */
        .cell-link {
            color: var(--accent-primary);
            text-decoration: none;
            border-bottom: 1px dotted var(--accent-primary);
        }

        .cell-link:hover {
            border-bottom-style: solid;
        }

        .cell-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            background: var(--info-light);
            color: var(--info);
        }

        .cell-badge.ontology {
            background: #f0fdf4;
            color: #166534;
        }

        .cell-badge.category {
            background: #fef3c7;
            color: #92400e;
        }

        /* Search Highlighting */
        mark.highlight {
            background: #fef08a;
            color: inherit;
            padding: 1px 2px;
            border-radius: 2px;
        }

        [data-theme="dark"] mark.highlight {
            background: #854d0e;
            color: #fef08a;
        }

        /* Hidden columns */
        .hidden-col {
            display: none !important;
        }

        /* =============================================================================
   EMPTY STATE
============================================================================= */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: var(--space-xl);
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin-bottom: var(--space-lg);
            opacity: 0.4;
        }

        .empty-state-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }

        .empty-state-text {
            font-size: 14px;
            max-width: 300px;
        }

        /* LOADING STATE */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: var(--space-md);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* =============================================================================
   DROPDOWN PANELS
============================================================================= */
        .dropdown-panel {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            min-width: 200px;
            max-height: 320px;
            overflow-y: auto;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            z-index: 100;
            display: none;
            padding: var(--space-sm);
        }

        .dropdown-panel.show {
            display: block;
        }

        .dropdown-panel-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: var(--space-xs) var(--space-sm);
            margin-bottom: var(--space-xs);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: var(--bg-hover);
        }

        .dropdown-item input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: var(--accent-primary);
        }

        /* =============================================================================
   PAGINATION
============================================================================= */
        .pagination {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .page-btn {
            min-width: 32px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-main);
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        /* =============================================================================
   ALERTS / TOASTS
============================================================================= */
        .toast-container {
            position: fixed;
            top: var(--space-lg);
            right: var(--space-lg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .toast {
            padding: var(--space-md) var(--space-lg);
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            box-shadow: var(--shadow-md);
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .toast-success {
            background: var(--success-light);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .toast-error {
            background: var(--danger-light);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .toast-info {
            background: var(--info-light);
            color: var(--info);
            border: 1px solid var(--info);
        }

        /* =============================================================================
   TOOLTIP
============================================================================= */
        .tooltip {
            position: fixed;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: var(--space-sm) var(--space-md);
            font-size: 12px;
            max-width: 400px;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            pointer-events: none;
            display: none;
        }

        .tooltip.show {
            display: block;
        }

        .tooltip-header {
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 2px;
            font-size: 11px;
        }

        .tooltip-value {
            font-family: var(--font-mono);
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* =============================================================================
   ACTIVE FILTERS CHIPS
============================================================================= */
        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs);
            margin-top: var(--space-sm);
        }

        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            background: var(--accent-light);
            color: var(--accent-primary);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .filter-chip-remove {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-primary);
            color: white;
            cursor: pointer;
            font-size: 10px;
        }

        .filter-chip-remove:hover {
            background: var(--danger);
        }

        /* =============================================================================
   DENSITY TOGGLE
============================================================================= */
        .density-compact .data-table td {
            padding: 4px 10px;
            font-size: 11px;
        }

        .density-compact .data-table th {
            padding: 8px 10px;
        }

        .density-comfortable .data-table td {
            padding: 12px 14px;
            font-size: 13px;
        }

        .density-comfortable .data-table th {
            padding: 14px 14px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="bi bi-table"></i>
                    <span>TableScanner</span>
                </div>
                <span class="sidebar-version">v2.0</span>
            </div>

            <div class="sidebar-content">
                <!-- Connection Section -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">
                        <i class="bi bi-hdd-network"></i> Connection
                    </div>
                    <div class="form-group">
                        <label class="form-label">BERDL Table ID</label>
                        <div class="input-group">
                            <input type="text" class="form-input form-input-sm" id="berdlTableId" value="76990/7/2"
                                placeholder="ws_id/obj_id/version">
                            <button class="btn btn-primary btn-sm btn-icon" id="loadBerdlBtn" title="Connect">
                                <i class="bi bi-arrow-right-circle"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Auth Token</label>
                        <input type="password" class="form-input form-input-sm" id="authToken"
                            placeholder="KBase token...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">API Endpoint</label>
                        <select class="form-select form-input-sm" id="apiUrlSelect">
                            <option value="http://localhost:8000">Local Development</option>
                            <option value="https://appdev.kbase.us/services/berdl_table_scanner">AppDev (Deployed)
                            </option>
                        </select>
                    </div>
                    <div id="objectTypeDisplay" style="display:none;margin-top:8px;">
                        <!-- Object type badge will be inserted here -->
                    </div>
                </div>

                <!-- Navigation Section -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">
                        <i class="bi bi-collection"></i> Navigation
                    </div>
                    <div class="form-group">
                        <label class="form-label">Select Table</label>
                        <select class="form-select" id="tableSelect" disabled>
                            <option value="">Connect to load tables...</option>
                        </select>
                    </div>
                    <button class="btn btn-success btn-block" id="loadDataBtn" disabled>
                        <i class="bi bi-play-fill"></i> Load Table Data
                    </button>
                </div>

                <!-- Categories Section -->
                <div class="sidebar-section" id="categoriesSection" style="display:none;">
                    <div class="sidebar-section-title">
                        <i class="bi bi-tags"></i> Column Categories
                    </div>
                    <div id="categoryToggles"></div>
                </div>

                <!-- Active Filters -->
                <div class="sidebar-section" id="activeFiltersSection" style="display:none;">
                    <div class="sidebar-section-title">
                        <i class="bi bi-funnel"></i> Active Filters
                        <button class="btn btn-sm btn-secondary" id="clearAllFilters"
                            style="margin-left:auto;padding:2px 6px;font-size:10px;">
                            Clear All
                        </button>
                    </div>
                    <div class="active-filters" id="activeFiltersChips"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-block" id="exportCsvBtn" disabled>
                    <i class="bi bi-download"></i> Export CSV
                </button>
                <button class="btn btn-secondary btn-block" id="resetViewBtn">
                    <i class="bi bi-arrow-counterclockwise"></i> Reset View
                </button>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-secondary btn-icon" id="themeToggle" title="Toggle theme" style="flex:1;">
                        <i class="bi bi-moon-stars"></i>
                    </button>
                    <button class="btn btn-danger btn-icon" id="clearCacheBtn" title="Clear cache" style="flex:1;">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- MAIN STAGE -->
        <main class="main-stage">
            <!-- TOOLBAR -->
            <div class="toolbar">
                <div class="toolbar-search">
                    <i class="bi bi-search"></i>
                    <input type="text" id="globalSearch" placeholder="Search all columns...">
                </div>

                <div class="toolbar-actions">
                    <div style="position:relative;">
                        <button class="btn btn-secondary btn-sm" id="filtersBtn">
                            <i class="bi bi-filter"></i> Filters
                        </button>
                    </div>
                    <div style="position:relative;">
                        <button class="btn btn-secondary btn-sm" id="columnsBtn">
                            <i class="bi bi-layout-three-columns"></i> Columns
                        </button>
                        <div class="dropdown-panel" id="columnsPanel">
                            <div class="dropdown-panel-title">Visible Columns</div>
                            <div style="display:flex;gap:4px;margin-bottom:8px;">
                                <button class="btn btn-sm btn-secondary" id="showAllCols">All</button>
                                <button class="btn btn-sm btn-secondary" id="hideAllCols">None</button>
                            </div>
                            <div id="columnsList"></div>
                        </div>
                    </div>
                    <select class="form-select form-input-sm" id="densitySelect" style="width:auto;">
                        <option value="compact">Compact</option>
                        <option value="default" selected>Default</option>
                        <option value="comfortable">Comfortable</option>
                    </select>
                    <select class="form-select form-input-sm" id="pageSizeSelect" style="width:auto;">
                        <option value="25">25 rows</option>
                        <option value="50">50 rows</option>
                        <option value="100" selected>100 rows</option>
                        <option value="250">250 rows</option>
                        <option value="500">500 rows</option>
                    </select>
                </div>
            </div>

            <!-- DATA GRID -->
            <div class="data-grid-wrapper" id="dataGridWrapper">
                <!-- Empty State -->
                <div class="empty-state" id="emptyState">
                    <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M3 10h18M3 14h18M3 18h18M3 6h18M8 6v12M16 6v12" />
                    </svg>
                    <div class="empty-state-title">Select a Table to Begin</div>
                    <div class="empty-state-text">Connect to a BERDL Table and select a table from the sidebar to
                        explore your data.</div>
                </div>

                <!-- Loading State -->
                <div class="loading-state" id="loadingState" style="display:none;">
                    <div class="spinner"></div>
                    <div style="color:var(--text-muted);font-size:14px;">Loading data from KBase...</div>
                </div>

                <!-- Data Grid Container -->
                <div class="data-grid-container" id="dataGridContainer" style="display:none;">
                    <table class="data-table" id="dataTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- STATUS BAR / FOOTER -->
            <div class="status-bar">
                <div class="status-left">
                    <div class="status-item">
                        <i class="bi bi-circle-fill" id="statusDot" style="font-size:8px;color:var(--text-muted);"></i>
                        <span id="statusText">Ready</span>
                    </div>
                    <div class="status-item">
                        <span>Showing</span>
                        <span class="status-value" id="showRange">0-0</span>
                        <span>of</span>
                        <span class="status-value" id="filteredCount">0</span>
                        <span>(Total: <span class="status-value" id="totalCount">0</span>)</span>
                    </div>
                </div>
                <div class="status-right">
                    <div class="status-item">
                        <i class="bi bi-clock"></i>
                        <span class="status-value" id="responseTime">--</span>ms
                    </div>
                    <div class="status-item">
                        <i class="bi bi-database"></i>
                        <span id="dataSource">--</span>
                    </div>
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Tooltip -->
    <div class="tooltip" id="cellTooltip">
        <div class="tooltip-header" id="tooltipHeader"></div>
        <div class="tooltip-value" id="tooltipValue"></div>
    </div>

    <script>
        (function () {
            'use strict';

            // =============================================================================
            // STATE
            // =============================================================================
            const state = {
                currentBerdlId: null,
                allHeaders: [],
                allData: [],
                visibleColumns: new Set(),
                sortColumn: null,
                sortOrder: 'asc',
                columnFilters: {},
                globalSearch: '',
                currentPage: 0,
                pageSize: 100,
                totalRows: 0,
                serverTotal: 0,
                lastTable: null,
                showFilters: false,
                density: 'default'
            };

            // =============================================================================
            // DOM ELEMENTS
            // =============================================================================
            const $ = id => document.getElementById(id);
            const dom = {
                berdlTableId: $('berdlTableId'),
                authToken: $('authToken'),
                apiUrlSelect: $('apiUrlSelect'),
                loadBerdlBtn: $('loadBerdlBtn'),
                tableSelect: $('tableSelect'),
                loadDataBtn: $('loadDataBtn'),
                globalSearch: $('globalSearch'),
                filtersBtn: $('filtersBtn'),
                columnsBtn: $('columnsBtn'),
                columnsPanel: $('columnsPanel'),
                columnsList: $('columnsList'),
                showAllCols: $('showAllCols'),
                hideAllCols: $('hideAllCols'),
                densitySelect: $('densitySelect'),
                pageSizeSelect: $('pageSizeSelect'),
                emptyState: $('emptyState'),
                loadingState: $('loadingState'),
                dataGridContainer: $('dataGridContainer'),
                dataGridWrapper: $('dataGridWrapper'),
                tableHead: $('tableHead'),
                tableBody: $('tableBody'),
                pagination: $('pagination'),
                statusDot: $('statusDot'),
                statusText: $('statusText'),
                showRange: $('showRange'),
                filteredCount: $('filteredCount'),
                totalCount: $('totalCount'),
                responseTime: $('responseTime'),
                dataSource: $('dataSource'),
                exportCsvBtn: $('exportCsvBtn'),
                resetViewBtn: $('resetViewBtn'),
                themeToggle: $('themeToggle'),
                clearCacheBtn: $('clearCacheBtn'),
                categoriesSection: $('categoriesSection'),
                categoryToggles: $('categoryToggles'),
                activeFiltersSection: $('activeFiltersSection'),
                activeFiltersChips: $('activeFiltersChips'),
                clearAllFilters: $('clearAllFilters'),
                toastContainer: $('toastContainer'),
                cellTooltip: $('cellTooltip'),
                tooltipHeader: $('tooltipHeader'),
                tooltipValue: $('tooltipValue')
            };

            // =============================================================================
            // UTILITIES
            // =============================================================================
            function debounce(fn, ms) {
                let t;
                return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
            }

            function getApiUrl() { return dom.apiUrlSelect.value; }

            function getHeaders() {
                const h = { 'Content-Type': 'application/json' };
                if (dom.authToken.value) h['Authorization'] = dom.authToken.value;
                return h;
            }

            function setStatus(text, type = 'info') {
                dom.statusText.textContent = text;
                const colors = { info: 'var(--text-muted)', success: 'var(--success)', error: 'var(--danger)', loading: 'var(--accent-primary)' };
                dom.statusDot.style.color = colors[type] || colors.info;
            }

            function showToast(msg, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.innerHTML = `<i class="bi bi-${type === 'error' ? 'x-circle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i>${msg}`;
                dom.toastContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }

            function escapeHtml(str) {
                if (str === null || str === undefined) return '';
                return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            // =============================================================================
            // LINK PATTERNS - Biological Database Identifiers
            // =============================================================================
            const LINK_PATTERNS = [
                {
                    name: 'uniprot', regex: /^(?:UniProt:)?([A-Z][0-9][A-Z0-9]{3}[0-9]|[A-Z][A-Z0-9]{5}[0-9](?:-\d+)?)$/i,
                    url: id => `https://www.uniprot.org/uniprotkb/${id}`, columns: ['uniprot_id', 'uniprot', 'swissprot']
                },
                {
                    name: 'kegg', regex: /^(?:KEGG:)?([a-z]{2,4}:[a-zA-Z0-9_]+)$/i,
                    url: id => `https://www.genome.jp/entry/${id}`, columns: ['kegg_id', 'kegg']
                },
                {
                    name: 'go', regex: /^(GO:\d{7})$/i,
                    url: id => `https://amigo.geneontology.org/amigo/term/${id.toUpperCase()}`, columns: ['go_id', 'go_term']
                },
                {
                    name: 'ec', regex: /^(?:EC:)?(\d+\.\d+\.\d+\.\d+)$/,
                    url: id => `https://enzyme.expasy.org/EC/${id}`, columns: ['ec_number', 'ec_id']
                },
                { name: 'url', regex: /^(https?:\/\/[^\s]+)$/i, url: m => m, columns: [] }
            ];

            function transformCellValue(value, columnName, searchTerm = '') {
                if (value === null || value === undefined || value === '') return '';
                const strVal = String(value).trim();
                if (!strVal) return '';

                let escaped = escapeHtml(strVal);
                const colLower = columnName.toLowerCase();

                // Check for links
                for (const pattern of LINK_PATTERNS) {
                    const colMatch = pattern.columns.length === 0 || pattern.columns.some(c => colLower.includes(c));
                    if (!colMatch && pattern.columns.length > 0) continue;

                    const match = strVal.match(pattern.regex);
                    if (match) {
                        const id = match[1] || match[0];
                        const url = pattern.url(id);
                        escaped = `<a href="${url}" target="_blank" rel="noopener" class="cell-link" title="${pattern.name.toUpperCase()}: ${id}">${escaped}</a>`;
                        break;
                    }
                }

                // Search highlighting
                if (searchTerm && searchTerm.length >= 2) {
                    const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                    escaped = escaped.replace(regex, '<mark class="highlight">$1</mark>');
                }

                return escaped;
            }

            // =============================================================================
            // UI STATE
            // =============================================================================
            function showLoading() {
                dom.emptyState.style.display = 'none';
                dom.loadingState.style.display = 'flex';
                dom.dataGridContainer.style.display = 'none';
                setStatus('Loading...', 'loading');
            }

            function hideLoading() { dom.loadingState.style.display = 'none'; }

            function showEmpty() {
                dom.emptyState.style.display = 'flex';
                dom.dataGridContainer.style.display = 'none';
            }

            function showTable() {
                dom.emptyState.style.display = 'none';
                dom.loadingState.style.display = 'none';
                dom.dataGridContainer.style.display = 'block';
            }

            // =============================================================================
            // API CALLS
            // =============================================================================
            async function loadBerdlTable() {
                const berdlId = dom.berdlTableId.value.trim();
                if (!berdlId) { showToast('Enter BERDL Table ID', 'error'); return; }
                if (!dom.authToken.value) { showToast('Enter Auth Token', 'error'); return; }

                state.currentBerdlId = berdlId;
                setStatus('Loading tables...', 'loading');

                try {
                    const url = new URL(`${getApiUrl()}/object/${berdlId}/tables`);
                    const res = await fetch(url, { headers: getHeaders() });
                    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);

                    const data = await res.json();
                    dom.tableSelect.innerHTML = '<option value="">Select a table...</option>' +
                        data.tables.map(t => `<option value="${t.name}">${t.name} (${t.row_count} rows)</option>`).join('');
                    dom.tableSelect.disabled = data.tables.length === 0;
                    dom.loadDataBtn.disabled = true;

                    // Store and display object type
                    state.objectType = data.object_type || 'Unknown';
                    updateObjectTypeDisplay();

                    setStatus(`Loaded ${data.tables.length} tables`, 'success');
                    showToast(`Connected! ${data.tables.length} tables available.`, 'success');
                } catch (err) {
                    setStatus(`Error: ${err.message}`, 'error');
                    showToast(err.message, 'error');
                }
            }

            function updateObjectTypeDisplay() {
                const container = document.getElementById('objectTypeDisplay');
                if (container && state.objectType && state.objectType !== 'Unknown') {
                    // Extract just the type name (e.g., "GenomeDataLakeTables" from "KBaseFBA.GenomeDataLakeTables-2.0")
                    const typeParts = state.objectType.split('.');
                    const typeWithVersion = typeParts[typeParts.length - 1];
                    const typeName = typeWithVersion.split('-')[0];
                    container.innerHTML = `<span class="cell-badge ontology" title="${state.objectType}">${typeName}</span>`;
                    container.style.display = 'block';
                }
            }

            async function loadTableData() {
                if (!dom.tableSelect.value) return;
                showLoading();

                const tableName = dom.tableSelect.value;

                try {
                    const url = new URL(`${getApiUrl()}/object/${state.currentBerdlId}/tables/${tableName}/data`);
                    url.searchParams.set('limit', state.pageSize);
                    url.searchParams.set('offset', state.currentPage * state.pageSize);
                    if (state.sortColumn) {
                        url.searchParams.set('sort_column', state.sortColumn);
                        url.searchParams.set('sort_order', state.sortOrder.toUpperCase());
                    }
                    if (state.globalSearch) url.searchParams.set('search', state.globalSearch);

                    const res = await fetch(url, { headers: getHeaders() });
                    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);

                    const data = await res.json();
                    state.allData = data.data || [];
                    state.allHeaders = data.headers || [];
                    state.totalRows = data.filtered_count;
                    state.serverTotal = data.row_count;

                    if (state.lastTable !== tableName || state.visibleColumns.size === 0) {
                        state.visibleColumns = new Set(state.allHeaders);
                        state.lastTable = tableName;
                    }

                    dom.responseTime.textContent = data.response_time_ms?.toFixed(0) || '--';
                    dom.dataSource.textContent = data.source || 'Server';
                    dom.exportCsvBtn.disabled = false;

                    hideLoading();
                    renderTable();
                    updatePagination();
                    updateColumnPanel();
                    updateCounts();
                    updateActiveFilters();
                    setStatus('Data loaded', 'success');
                } catch (err) {
                    hideLoading();
                    showEmpty();
                    setStatus(`Error: ${err.message}`, 'error');
                    showToast(err.message, 'error');
                }
            }

            // =============================================================================
            // RENDERING
            // =============================================================================
            function renderTable() {
                if (!state.allHeaders.length) { showEmpty(); return; }
                showTable();

                // Header
                let headerHtml = '<tr>';
                state.allHeaders.forEach(h => {
                    const hidden = !state.visibleColumns.has(h) ? ' hidden-col' : '';
                    const sortClass = state.sortColumn === h ? (state.sortOrder === 'asc' ? ' sort-asc' : ' sort-desc') : '';
                    headerHtml += `<th class="sortable${hidden}${sortClass}" data-col="${h}">${escapeHtml(h)}</th>`;
                });
                headerHtml += '</tr>';
                dom.tableHead.innerHTML = headerHtml;

                // Body
                dom.tableBody.innerHTML = state.allData.map((row, ri) => {
                    return '<tr>' + state.allHeaders.map((h, ci) => {
                        const hidden = !state.visibleColumns.has(h) ? ' hidden-col' : '';
                        const rawVal = row[ci] ?? '';
                        const displayVal = transformCellValue(rawVal, h, state.globalSearch);
                        return `<td class="${hidden}" data-row="${ri}" data-col="${ci}" data-raw="${escapeHtml(String(rawVal))}">${displayVal}</td>`;
                    }).join('') + '</tr>';
                }).join('');
            }

            function updateCounts() {
                const start = state.currentPage * state.pageSize;
                const count = state.allData.length;
                dom.showRange.textContent = count ? `${start + 1}-${start + count}` : '0-0';
                dom.filteredCount.textContent = state.totalRows || 0;
                dom.totalCount.textContent = state.serverTotal || 0;
            }

            function updatePagination() {
                const totalPages = Math.ceil((state.totalRows || 0) / state.pageSize);
                if (totalPages <= 1) { dom.pagination.innerHTML = ''; return; }

                let html = `<button class="page-btn" data-page="0" ${state.currentPage === 0 ? 'disabled' : ''}>«</button>`;
                html += `<button class="page-btn" data-page="${state.currentPage - 1}" ${state.currentPage === 0 ? 'disabled' : ''}>‹</button>`;

                const maxBtns = 5;
                let start = Math.max(0, state.currentPage - 2);
                let end = Math.min(totalPages, start + maxBtns);
                if (end - start < maxBtns) start = Math.max(0, end - maxBtns);

                for (let i = start; i < end; i++) {
                    html += `<button class="page-btn${i === state.currentPage ? ' active' : ''}" data-page="${i}">${i + 1}</button>`;
                }

                html += `<button class="page-btn" data-page="${state.currentPage + 1}" ${state.currentPage >= totalPages - 1 ? 'disabled' : ''}>›</button>`;
                html += `<button class="page-btn" data-page="${totalPages - 1}" ${state.currentPage >= totalPages - 1 ? 'disabled' : ''}>»</button>`;
                dom.pagination.innerHTML = html;
            }

            function updateColumnPanel() {
                dom.columnsList.innerHTML = state.allHeaders.map(h => `
            <label class="dropdown-item">
                <input type="checkbox" data-toggle-col="${h}" ${state.visibleColumns.has(h) ? 'checked' : ''}>
                <span>${escapeHtml(h)}</span>
            </label>
        `).join('');
            }

            function updateActiveFilters() {
                const hasFilters = state.globalSearch || Object.keys(state.columnFilters).length > 0;
                dom.activeFiltersSection.style.display = hasFilters ? 'block' : 'none';

                let chips = '';
                if (state.globalSearch) {
                    chips += `<span class="filter-chip">Search: "${state.globalSearch}" <span class="filter-chip-remove" data-clear="search">×</span></span>`;
                }
                for (const [col, val] of Object.entries(state.columnFilters)) {
                    chips += `<span class="filter-chip">${col}: "${val}" <span class="filter-chip-remove" data-clear-col="${col}">×</span></span>`;
                }
                dom.activeFiltersChips.innerHTML = chips;
            }

            // =============================================================================
            // EXPORT
            // =============================================================================
            function exportCsv() {
                const visibleHeaders = state.allHeaders.filter(h => state.visibleColumns.has(h));
                const visibleIndices = visibleHeaders.map(h => state.allHeaders.indexOf(h));

                let csv = visibleHeaders.map(h => `"${h.replace(/"/g, '""')}"`).join(',') + '\n';
                state.allData.forEach(row => {
                    csv += visibleIndices.map(i => `"${String(row[i] ?? '').replace(/"/g, '""')}"`).join(',') + '\n';
                });

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${dom.tableSelect.value}_page_${state.currentPage + 1}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('CSV exported successfully', 'success');
            }

            // =============================================================================
            // TOOLTIP
            // =============================================================================
            function showCellTooltip(e, col, value) {
                dom.tooltipHeader.textContent = col;
                dom.tooltipValue.textContent = value || '(empty)';
                dom.cellTooltip.style.left = (e.clientX + 12) + 'px';
                dom.cellTooltip.style.top = (e.clientY + 12) + 'px';
                dom.cellTooltip.classList.add('show');
            }

            function hideCellTooltip() { dom.cellTooltip.classList.remove('show'); }

            // =============================================================================
            // EVENT HANDLERS
            // =============================================================================
            dom.loadBerdlBtn.addEventListener('click', loadBerdlTable);
            dom.berdlTableId.addEventListener('keypress', e => { if (e.key === 'Enter') loadBerdlTable(); });
            dom.tableSelect.addEventListener('change', () => { dom.loadDataBtn.disabled = !dom.tableSelect.value; });
            dom.loadDataBtn.addEventListener('click', () => { state.currentPage = 0; loadTableData(); });

            dom.globalSearch.addEventListener('input', debounce(() => {
                state.globalSearch = dom.globalSearch.value;
                state.currentPage = 0;
                loadTableData();
            }, 400));

            dom.pageSizeSelect.addEventListener('change', () => {
                state.pageSize = parseInt(dom.pageSizeSelect.value);
                state.currentPage = 0;
                loadTableData();
            });

            dom.densitySelect.addEventListener('change', () => {
                state.density = dom.densitySelect.value;
                dom.dataGridWrapper.className = 'data-grid-wrapper' + (state.density !== 'default' ? ` density-${state.density}` : '');
            });

            dom.columnsBtn.addEventListener('click', e => {
                e.stopPropagation();
                dom.columnsPanel.classList.toggle('show');
            });

            dom.showAllCols.addEventListener('click', () => {
                state.visibleColumns = new Set(state.allHeaders);
                renderTable();
                updateColumnPanel();
            });

            dom.hideAllCols.addEventListener('click', () => {
                state.visibleColumns.clear();
                if (state.allHeaders.length) state.visibleColumns.add(state.allHeaders[0]);
                renderTable();
                updateColumnPanel();
            });

            dom.resetViewBtn.addEventListener('click', () => {
                state.visibleColumns = new Set(state.allHeaders);
                state.sortColumn = null;
                state.sortOrder = 'asc';
                state.columnFilters = {};
                state.globalSearch = '';
                state.currentPage = 0;
                dom.globalSearch.value = '';
                loadTableData();
            });

            dom.exportCsvBtn.addEventListener('click', exportCsv);

            dom.themeToggle.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                dom.themeToggle.innerHTML = isDark ? '<i class="bi bi-moon-stars"></i>' : '<i class="bi bi-sun"></i>';
            });

            dom.clearCacheBtn.addEventListener('click', async () => {
                if (!confirm('Clear server cache and re-download data?')) return;
                try {
                    const url = new URL(`${getApiUrl()}/clear-cache`);
                    if (state.currentBerdlId) url.searchParams.set('berdl_table_id', state.currentBerdlId);
                    const res = await fetch(url, { method: 'POST', headers: getHeaders() });
                    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
                    showToast('Cache cleared', 'success');
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });

            dom.clearAllFilters.addEventListener('click', () => {
                state.columnFilters = {};
                state.globalSearch = '';
                dom.globalSearch.value = '';
                state.currentPage = 0;
                loadTableData();
            });

            // Delegated events
            document.addEventListener('click', e => {
                // Close panels on outside click
                if (!dom.columnsPanel.contains(e.target) && !dom.columnsBtn.contains(e.target)) {
                    dom.columnsPanel.classList.remove('show');
                }

                // Column header sort
                const th = e.target.closest('.data-table th[data-col]');
                if (th) {
                    const col = th.dataset.col;
                    if (state.sortColumn === col) {
                        state.sortOrder = state.sortOrder === 'asc' ? 'desc' : 'asc';
                    } else {
                        state.sortColumn = col;
                        state.sortOrder = 'asc';
                    }
                    state.currentPage = 0;
                    loadTableData();
                }

                // Pagination
                const pageBtn = e.target.closest('.page-btn[data-page]');
                if (pageBtn && !pageBtn.disabled) {
                    state.currentPage = parseInt(pageBtn.dataset.page);
                    loadTableData();
                }

                // Clear filter chips
                if (e.target.dataset.clear === 'search') {
                    state.globalSearch = '';
                    dom.globalSearch.value = '';
                    state.currentPage = 0;
                    loadTableData();
                }
                if (e.target.dataset.clearCol) {
                    delete state.columnFilters[e.target.dataset.clearCol];
                    state.currentPage = 0;
                    loadTableData();
                }
            });

            // Column toggles
            document.addEventListener('change', e => {
                if (e.target.dataset.toggleCol) {
                    const col = e.target.dataset.toggleCol;
                    if (e.target.checked) state.visibleColumns.add(col);
                    else state.visibleColumns.delete(col);
                    renderTable();
                }
            });

            // Tooltip
            document.addEventListener('mouseover', e => {
                if (e.target.matches('.data-table td')) {
                    const colIdx = parseInt(e.target.dataset.col);
                    const col = state.allHeaders[colIdx];
                    const rawValue = e.target.dataset.raw || '';
                    showCellTooltip(e, col, rawValue);
                }
            });

            document.addEventListener('mouseout', e => {
                if (e.target.matches('.data-table td')) hideCellTooltip();
            });

            document.addEventListener('mousemove', e => {
                if (dom.cellTooltip.classList.contains('show')) {
                    dom.cellTooltip.style.left = (e.clientX + 12) + 'px';
                    dom.cellTooltip.style.top = (e.clientY + 12) + 'px';
                }
            });

            // Init
            setStatus('Ready');
        })();
    </script>
</body>

</html>
